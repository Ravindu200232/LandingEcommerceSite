AWSTemplateFormatVersion: '2010-09-09'
Description: Deployment Agent bootstrap infrastructure for a Next.js ECS Fargate service

Parameters:
  ProjectSlug:
    Type: String
    AllowedPattern: '[a-z0-9-]+'
  GitHubSubjects:
    Type: CommaDelimitedList
    Description: Exact classic and immutable GitHub OIDC subjects for the authenticated repository and default branch
  AppPort:
    Type: Number
    Default: 3000
  ExistingOidcProviderArn:
    Type: String
    Default: ''

Conditions:
  CreateOidcProvider: !Equals [!Ref ExistingOidcProviderArn, '']

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{Key: Name, Value: !Sub '${ProjectSlug}-vpc'}]
  InternetGateway:
    Type: AWS::EC2::InternetGateway
  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref Vpc, InternetGatewayId: !Ref InternetGateway}
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: !Sub '${ProjectSlug}-public-a'}]
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: !Sub '${ProjectSlug}-public-b'}]
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref Vpc}
  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  SubnetARouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRouteTable}
  SubnetBRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRouteTable}
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access to the application load balancer
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0}
  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Application traffic from the ALB only
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      SecurityGroups: [!Ref AlbSecurityGroup]
      Subnets: [!Ref PublicSubnetA, !Ref PublicSubnetB]
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      Port: !Ref AppPort
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /api/health
      Matcher: {HttpCode: '200-399'}
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions: [{Type: forward, TargetGroupArn: !Ref TargetGroup}]
  Cluster:
    Type: AWS::ECS::Cluster
    Properties: {ClusterName: !Sub '${ProjectSlug}-cluster'}
  Repository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ProjectSlug
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration: {ScanOnPush: true}
      EncryptionConfiguration: {EncryptionType: AES256}
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectSlug}'
      RetentionInDays: 30
  RuntimeSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/deployment-agent/${ProjectSlug}/runtime'
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: INITIAL_PLACEHOLDER
        PasswordLength: 32
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectSlug}-ecs-execution'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: ecs-tasks.amazonaws.com}, Action: 'sts:AssumeRole'}]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadRuntimeSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement: [{Effect: Allow, Action: ['secretsmanager:GetSecretValue'], Resource: !Ref RuntimeSecret}]
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectSlug}-ecs-task'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: ecs-tasks.amazonaws.com}, Action: 'sts:AssumeRole'}]
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList: [sts.amazonaws.com]
  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectSlug}-github-deploy'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If [CreateOidcProvider, !Ref GitHubOidcProvider, !Ref ExistingOidcProviderArn]
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': sts.amazonaws.com
                'token.actions.githubusercontent.com:sub': !Ref GitHubSubjects
      Policies:
        - PolicyName: ProjectDeployment
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - {Effect: Allow, Action: ['ecr:GetAuthorizationToken'], Resource: '*'}
              - Effect: Allow
                Action: ['ecr:BatchCheckLayerAvailability','ecr:CompleteLayerUpload','ecr:GetDownloadUrlForLayer','ecr:InitiateLayerUpload','ecr:PutImage','ecr:UploadLayerPart','ecr:BatchGetImage']
                Resource: !GetAtt Repository.Arn
              - {Effect: Allow, Action: ['cloudformation:CreateStack','cloudformation:UpdateStack','cloudformation:CreateChangeSet','cloudformation:ExecuteChangeSet','cloudformation:DeleteChangeSet','cloudformation:DescribeChangeSet','cloudformation:DescribeStacks','cloudformation:DescribeStackEvents','cloudformation:DescribeStackResources','cloudformation:GetTemplate','cloudformation:GetTemplateSummary','cloudformation:ValidateTemplate'], Resource: '*'}
              - {Effect: Allow, Action: ['ecs:RegisterTaskDefinition','ecs:DeregisterTaskDefinition','ecs:CreateService','ecs:UpdateService','ecs:DeleteService','ecs:DescribeServices','ecs:DescribeTaskDefinition','ecs:ListTasks','ecs:DescribeTasks','ecs:TagResource','ecs:UntagResource','elasticloadbalancing:DescribeTargetHealth'], Resource: '*'}
              - Effect: Allow
                Action: ['iam:PassRole']
                Resource: [!GetAtt ExecutionRole.Arn, !GetAtt TaskRole.Arn]

Outputs:
  ApplicationUrl:
    Value: !Sub 'http://${LoadBalancer.DNSName}'
  EcrRepositoryName: {Value: !Ref Repository}
  EcrRepositoryUri: {Value: !GetAtt Repository.RepositoryUri}
  DeployRoleArn: {Value: !GetAtt GitHubDeployRole.Arn}
  RuntimeSecretArn: {Value: !Ref RuntimeSecret}
  ClusterName:
    Value: !Ref Cluster
    Export: {Name: !Sub '${ProjectSlug}-ClusterName'}
  PublicSubnets:
    Value: !Join [',', [!Ref PublicSubnetA, !Ref PublicSubnetB]]
    Export: {Name: !Sub '${ProjectSlug}-PublicSubnets'}
  TaskSecurityGroup:
    Value: !Ref TaskSecurityGroup
    Export: {Name: !Sub '${ProjectSlug}-TaskSecurityGroup'}
  TargetGroupArn:
    Value: !Ref TargetGroup
    Export: {Name: !Sub '${ProjectSlug}-TargetGroupArn'}
  ExecutionRoleArn:
    Value: !GetAtt ExecutionRole.Arn
    Export: {Name: !Sub '${ProjectSlug}-ExecutionRoleArn'}
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
    Export: {Name: !Sub '${ProjectSlug}-TaskRoleArn'}
  RuntimeSecretExport:
    Value: !Ref RuntimeSecret
    Export: {Name: !Sub '${ProjectSlug}-RuntimeSecretArn'}
  LogGroupName:
    Value: !Ref LogGroup
    Export: {Name: !Sub '${ProjectSlug}-LogGroupName'}
